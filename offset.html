<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Dance - 偏移测试</title>
    <style>
        :root {
            --bg-color: #1d2430;
            --text-main: #d4e5f0;
            --text-sub: #8fa4b8;
            --border-main: #4a5d73;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none;
            z-index: 1;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 720px;
            aspect-ratio: 9/16;
            max-height: 100vh;
            max-height: 100dvh;
            background: #1d2430;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--border-main);
            border-radius: 8px;
            color: var(--text-main);
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
            z-index: 20;
        }

        .top-panel {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 10px 20px;
            pointer-events: auto;
            z-index: 20;
            text-align: center;
            border: 1px solid var(--border-main);
        }
    </style>
</head>

<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="720" height="1280"></canvas>
        <div class="top-bar">
            <button id="backBtn" class="btn">返回</button>
        </div>
        <div class="top-panel">
            <div style="margin-bottom: 8px; font-size: 14px;">
                当前偏移: <span id="valOffset">0</span> ms
            </div>
            <input type="range" id="sliderOffset" min="-500" max="500" value="0" step="1" style="width: 100%;">
            <div style="font-size: 12px; color: var(--text-sub); margin-top: 6px;">
                提示: <span style="color: #4ea8de">蓝色为偏快(需增加偏移)</span>, <span
                    style="color: #ff6b6b">红色为偏慢(需减少偏移)</span><br>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const sliderOffset = document.getElementById('sliderOffset');
        const valOffset = document.getElementById('valOffset');

        let globalOffset = parseFloat(localStorage.getItem('dance_offset')) || 0;
        sliderOffset.value = globalOffset;
        valOffset.innerText = globalOffset;

        sliderOffset.addEventListener('input', (e) => {
            globalOffset = parseFloat(e.target.value);
            valOffset.innerText = globalOffset;
            localStorage.setItem('dance_offset', globalOffset);
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let clickBuffer = null;
        let hitBuffer = null;
        let isPlaying = false;
        let startTime = 0;
        let nextBeatTime = 0;
        let currentBeat = 0;

        const BPM = 120;
        const BEAT_DURATION = 60 / BPM;

        let activeNotes = [];
        let floatTexts = [];
        let particles = [];
        let trackEffects = [];

        const trackCenter = { x: 360, y: 640 };
        const trackRadius = 260;

        const ASSETS = { note1: "./resources/note1.webp", note2: "./resources/note2.webp" };
        const IMAGE_ASSETS = { note1: null, note2: null };
        function initImages() {
            IMAGE_ASSETS.note1 = new Image(); IMAGE_ASSETS.note1.src = ASSETS.note1;
            IMAGE_ASSETS.note2 = new Image(); IMAGE_ASSETS.note2.src = ASSETS.note2;
        }

        async function initAudio() {
            try {
                const res = await fetch("resources/sfx/empty.mp3");
                const arrayBuffer = await res.arrayBuffer();
                clickBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                const resHit = await fetch("resources/sfx/perfect.mp3");
                const arrayBufferHit = await resHit.arrayBuffer();
                hitBuffer = await audioCtx.decodeAudioData(arrayBufferHit);
            } catch (e) {
                console.error("加载音效失败", e);
            }
        }

        function playClick() {
            if (!hitBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = hitBuffer;
            const sfxVolume = localStorage.getItem('dance_sfxVol') !== null ? parseInt(localStorage.getItem('dance_sfxVol')) / 100 : 0.5;
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = sfxVolume;
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start(0);
        }

        function spawnNote(targetBeat) {
            let spawnTime = startTime + (targetBeat - 2) * BEAT_DURATION;
            let targetTime = startTime + targetBeat * BEAT_DURATION;
            activeNotes.push({
                beat: targetBeat,
                time: targetTime,
                spawnTime: spawnTime,
                isHit: false,
                isMissed: false,
                alpha: 0,
                scale: 0
            });
        }

        function scheduleBeats() {
            if (audioCtx.state === 'suspended') return;

            while (nextBeatTime < audioCtx.currentTime + 0.1) {
                if (clickBuffer) {
                    const source = audioCtx.createBufferSource();
                    source.buffer = clickBuffer;
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.5;
                    source.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    source.start(nextBeatTime);
                }

                let futureBeat = currentBeat + 2;
                if (futureBeat % 4 === 3) {
                    spawnNote(futureBeat);
                }

                currentBeat++;
                nextBeatTime += BEAT_DURATION;
            }
        }

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            handleInput();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') handleInput();
        });

        function handleInput() {
            if (!isPlaying) {
                startGame();
                return;
            }

            let nowTime = audioCtx.currentTime;

            let closestNote = null;
            let minDiff = 0.200;
            let diffRaw = 0;

            for (let i = 0; i < activeNotes.length; i++) {
                let n = activeNotes[i];
                if (!n.isHit && !n.isMissed && nowTime >= n.spawnTime) {
                    // 玩家点击时间与理想要击打时间（带偏移量）作对比
                    // 当 globalOffset 增加时，游戏引擎中会使判定的发生时间 "提前"，所以我们要补偿。
                    // 逻辑：游戏时间 = 真实时间 - globalOffset。
                    // 因此理想要击打真实时间 = n.time + globalOffset
                    let idealHitTime = n.time + (globalOffset / 1000);
                    let diff = nowTime - idealHitTime;

                    if (Math.abs(diff) <= minDiff) {
                        minDiff = Math.abs(diff);
                        closestNote = n;
                        diffRaw = diff;
                    }
                }
            }

            if (closestNote) {
                closestNote.isHit = true;

                let msDiff = Math.round(diffRaw * 1000);
                let text = msDiff > 0 ? `+${msDiff}ms(偏慢)` : (msDiff < 0 ? `${msDiff}ms(偏快)` : `0ms(完美)`);
                let color = msDiff < 0 ? "#4ea8de" : "#ff6b6b";
                if (Math.abs(msDiff) <= 15) {
                    color = "#e3b56b";
                }

                showFloatingText(text, color);
                createParticles(closestNote.beat, color);
                trackEffects.push({ life: 1.0, scale: 1.0, color: color });
                playClick();
            } else {
                playClick();
            }
        }

        function createParticles(beat, color) {
            let angle = ((beat % 4) / 4) * Math.PI * 2 - Math.PI / 2;
            let nx = trackCenter.x + Math.cos(angle) * trackRadius;
            let ny = trackCenter.y + Math.sin(angle) * trackRadius;
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: nx, y: ny,
                    vx: (Math.random() - 0.5) * 400,
                    vy: (Math.random() - 0.5) * 400,
                    life: 1.0, color: color
                });
            }
        }

        function showFloatingText(text, color) {
            floatTexts.push({ text: text, color: color, life: 1.0, yOffset: 0 });
        }

        let lastTime = performance.now() / 1000;

        function update() {
            let nowTime = performance.now() / 1000;
            let dt = nowTime - lastTime;
            lastTime = nowTime;

            if (isPlaying) scheduleBeats();

            let currentAudioTime = audioCtx.currentTime;

            for (let i = activeNotes.length - 1; i >= 0; i--) {
                let n = activeNotes[i];
                if (n.isHit || n.isMissed) {
                    n.alpha -= dt * 5;
                    if (n.alpha <= 0) activeNotes.splice(i, 1);
                } else if (currentAudioTime >= n.spawnTime) {
                    n.alpha = Math.min(1, n.alpha + dt * 4);
                    n.scale = Math.min(1, n.scale + dt * 4);

                    let idealHitTime = n.time + (globalOffset / 1000);
                    if (currentAudioTime > idealHitTime + 0.200) {
                        n.isMissed = true;
                        showFloatingText("MISS", "#d68a8a");
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 2;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                let f = floatTexts[i];
                f.life -= dt * 1.5;
                f.yOffset -= dt * 50;
                if (f.life <= 0) floatTexts.splice(i, 1);
            }

            for (let i = trackEffects.length - 1; i >= 0; i--) {
                let e = trackEffects[i];
                e.life -= dt * 2; e.scale += dt * 0.4;
                if (e.life <= 0) trackEffects.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1d2430";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.beginPath();
            ctx.arc(trackCenter.x, trackCenter.y, trackRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255, 255, 255, 1)";
            ctx.lineWidth = 8;
            ctx.stroke();

            for (let i = 0; i < 8; i++) {
                let ang = (i / 8) * Math.PI * 2 - Math.PI / 2;
                let r = (i % 2 === 0) ? 10 : 8;
                ctx.beginPath();
                ctx.arc(trackCenter.x + Math.cos(ang) * trackRadius, trackCenter.y + Math.sin(ang) * trackRadius, r, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 1)";
                ctx.fill();
            }
            ctx.restore();

            if (isPlaying) {
                let beatProgress = (audioCtx.currentTime - startTime) / BEAT_DURATION;
                let angle = (beatProgress % 4) / 4 * Math.PI * 2 - Math.PI / 2;
                let px = trackCenter.x + Math.cos(angle) * trackRadius;
                let py = trackCenter.y + Math.sin(angle) * trackRadius;
                ctx.beginPath();
                ctx.arc(px, py, 15, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                ctx.fill();
            }

            trackEffects.forEach(e => {
                ctx.beginPath();
                ctx.arc(trackCenter.x, trackCenter.y, trackRadius * e.scale, 0, Math.PI * 2);
                ctx.strokeStyle = e.color;
                ctx.globalAlpha = e.life;
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            });

            activeNotes.forEach(n => {
                let angle = ((n.beat % 4) / 4) * Math.PI * 2 - Math.PI / 2;
                let nx = trackCenter.x + Math.cos(angle) * trackRadius;
                let ny = trackCenter.y + Math.sin(angle) * trackRadius;

                ctx.save();
                ctx.translate(nx, ny);
                ctx.rotate(angle + Math.PI / 2);
                ctx.globalAlpha = n.alpha;

                let s = n.scale;
                if (n.isHit) {
                    s *= (1 + (1 - n.alpha) * 0.5);
                }
                ctx.scale(s, s);

                let isWholeBeat = (n.beat % 1 === 0);
                let img = isWholeBeat ? IMAGE_ASSETS.note1 : IMAGE_ASSETS.note2;

                if (img && img.complete && img.naturalWidth > 0) {
                    let size = 80;
                    ctx.drawImage(img, -size / 2, -size / 2, size, size);
                } else {
                    ctx.fillStyle = isWholeBeat ? "#e3b56b" : "#7ea8c4";
                    ctx.beginPath();
                    ctx.arc(0, 0, 24, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                ctx.restore();
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 8, 8);
            });
            ctx.globalAlpha = 1.0;

            floatTexts.forEach(f => {
                ctx.globalAlpha = Math.min(1, f.life * 2);
                ctx.fillStyle = f.color;
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText(f.text, trackCenter.x, trackCenter.y - 100 + f.yOffset);
            });
            ctx.globalAlpha = 1.0;
            ctx.restore();

            if (!isPlaying) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("点击屏幕开始测试", canvas.width / 2, canvas.height / 2);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        async function startGame() {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            await initAudio();
            startTime = audioCtx.currentTime + 1.0;
            nextBeatTime = startTime;
            currentBeat = 0;
            activeNotes = [];
            isPlaying = true;
        }

        initImages();
        loop();

    </script>
</body>

</html>
